{% extends "base.html" %}

{% block title %}Check-Out{% endblock %}

{% block content %}
<h2 style="color: #667eea; margin-bottom: 20px;">Check-Out</h2>

<form method="POST" action="{{ url_for('checkout') }}">
    <div class="form-group">
        <label for="booking_id">Booking ID:</label>
        <input type="number" id="booking_id" name="booking_id" placeholder="Enter your booking ID" required>
    </div>
    
    <button type="submit" class="btn btn-success">Check-Out</button>
    <a href="{{ url_for('index') }}" class="btn">Cancel</a>
</form>

<div style="margin-top: 30px; padding: 20px; background: #f0f4ff; border-radius: 5px;">
    <h3 style="color: #667eea;">Check-Out Requirements:</h3>
    <ul style="margin-top: 10px; margin-left: 20px; color: #666;">
        <li>Payment must be completed before check-out</li>
        <li>You must be checked-in to check-out</li>
        <li>Room will be available for new bookings after check-out</li>
    </ul>
</div>
{% endblock %}
