{% extends "base.html" %}

{% block title %}Check-In{% endblock %}

{% block content %}
<h2 style="color: #667eea; margin-bottom: 20px;">Check-In</h2>

<form method="POST" action="{{ url_for('check_in') }}">
    <div class="form-group">
        <label for="booking_id">Booking ID:</label>
        <input type="number" id="booking_id" name="booking_id" placeholder="Enter your booking ID" required>
    </div>
    
    <button type="submit" class="btn btn-success">Check-In</button>
    <a href="{{ url_for('index') }}" class="btn">Cancel</a>
</form>

<div style="margin-top: 30px; padding: 20px; background: #f0f4ff; border-radius: 5px;">
    <h3 style="color: #667eea;">Check-In Instructions:</h3>
    <ul style="margin-top: 10px; margin-left: 20px; color: #666;">
        <li>Enter your Booking ID received during booking</li>
        <li>Make sure you arrive on your check-in date</li>
        <li>Have your identification ready</li>
    </ul>
</div>
{% endblock %}
