{% extends "base.html" %}

{% block content %}
<h2>Book a Room</h2>

{% if rooms %}
<form method="POST" class="form">
    <div class="form-group">
        <label for="customer_name">Customer Name</label>
        <input type="text" id="customer_name" name="customer_name" required>
    </div>
    
    <div class="form-group">
        <label for="room_number">Select Room</label>
        <select id="room_number" name="room_number" required>
            <option value="">-- Select a Room --</option>
            {% for room in rooms %}
            <option value="{{ room.room_number }}">
                Room {{ room.room_number }} - {{ room.room_type }} - ${{ room.price_per_night }}/night
            </option>
            {% endfor %}
        </select>
    </div>
    
    <div class="form-row">
        <div class="form-group">
            <label for="check_in">Check-In Date</label>
            <input type="date" id="check_in" name="check_in" required>
        </div>
        
        <div class="form-group">
            <label for="check_out">Check-Out Date</label>
            <input type="date" id="check_out" name="check_out" required>
        </div>
    </div>
    
    <button type="submit" class="btn btn-primary">Create Booking</button>
</form>
{% else %}
<p class="empty-message">No rooms available for booking.</p>
{% endif %}
{% endblock %}
